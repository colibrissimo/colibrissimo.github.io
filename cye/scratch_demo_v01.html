<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLOOM — Scratch Reveal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0F172A;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      gap: 2rem;
    }

    .label-above {
      font-size: 0.72rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
    }

    .scratch-wrapper {
      position: relative;
      width: min(300px, 88vw);
      aspect-ratio: 1;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(8,145,178,0.15), 0 24px 48px rgba(0,0,0,0.5);
    }

    .reveal-layer {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.6em;
      background: #0891B2;
    }

    .reveal-word {
      font-size: clamp(2.2rem, 10vw, 3.8rem);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .reveal-word span { color: #F97316; }

    .reveal-direction {
      font-size: clamp(0.7rem, 2.5vw, 0.85rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
    }

    /* Two canvases stacked: scratch below, particles above */
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    #scratch-canvas {
      cursor: crosshair;
      transition: opacity 0.5s ease;
    }

    #particle-canvas {
      pointer-events: none; /* particles don't block input */
    }

    .hint {
      font-size: 0.72rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      transition: opacity 0.6s ease;
    }

    .hint.hidden { opacity: 0; }
  </style>
</head>
<body>

  <p class="label-above">Scratch to reveal</p>

  <div class="scratch-wrapper" id="wrapper">
    <div class="reveal-layer">
      <div class="reveal-word">give <span>UP</span></div>
      <div class="reveal-direction">↑ &nbsp; upward movement</div>
    </div>
    <canvas id="scratch-canvas"></canvas>
    <canvas id="particle-canvas"></canvas>
  </div>

  <p class="hint" id="hint">drag your finger or mouse</p>

  <script>
    const scratchCanvas  = document.getElementById('scratch-canvas');
    const sCtx           = scratchCanvas.getContext('2d');
    const particleCanvas = document.getElementById('particle-canvas');
    const pCtx           = particleCanvas.getContext('2d');
    const wrapper        = document.getElementById('wrapper');
    const hint           = document.getElementById('hint');

    const BRUSH_R     = 30;
    const COMPLETE_AT = 0.85;
    const CHECK_EVERY = 25;

    let drawing   = false;
    let events    = 0;
    let completed = false;
    let animating = false;
    let audioCtx  = null;

    // Scratch loop nodes — started on touchstart/mousedown, stopped on lift
    let scratchOsc  = null;
    let scratchGain = null;

    const particles = [];

    // ── Audio ─────────────────────────────────────────────────────────────────

    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function startScratchLoop() {
      if (!audioCtx || scratchOsc) return;

      // Two detuned sawtooth oscillators → filtered → gain
      const merge = audioCtx.createGain();
      merge.gain.value = 0;  // silent until finger moves
      merge.connect(audioCtx.destination);

      [2500, 3900].forEach(freq => {
        const osc = audioCtx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.value = freq;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = freq;
        filter.Q.value = 2;
        osc.connect(filter);
        filter.connect(merge);
        osc.start();
      });

      scratchGain = merge;
      scratchOsc  = true; // flag — we don't need individual osc refs
      // Fade in
      scratchGain.gain.setValueAtTime(0, audioCtx.currentTime);
      scratchGain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.05);
    }

    function stopScratchLoop() {
      if (!scratchGain) return;
      scratchGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.08);
      // Disconnect after fade
      setTimeout(() => {
        try { scratchGain.disconnect(); } catch(_) {}
        scratchGain = null;
        scratchOsc  = null;
      }, 120);
    }

    function playRisingTone() {
      if (!audioCtx) return;
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.type = 'sine';
      osc.frequency.setValueAtTime(330, audioCtx.currentTime);
      osc.frequency.linearRampToValueAtTime(660, audioCtx.currentTime + 0.65);

      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.28, audioCtx.currentTime + 0.04);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.75);

      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.8);
    }

    // ── Canvas init ───────────────────────────────────────────────────────────

    function initCanvas() {
      const rect = wrapper.getBoundingClientRect();
      scratchCanvas.width  = particleCanvas.width  = rect.width;
      scratchCanvas.height = particleCanvas.height = rect.height;
      drawOverlay();
    }

    function drawOverlay() {
      sCtx.fillStyle = '#1E293B';
      sCtx.fillRect(0, 0, scratchCanvas.width, scratchCanvas.height);

      const shimmer = sCtx.createLinearGradient(0, 0, scratchCanvas.width, scratchCanvas.height);
      shimmer.addColorStop(0,    'rgba(8,145,178,0)');
      shimmer.addColorStop(0.45, 'rgba(8,145,178,0.1)');
      shimmer.addColorStop(1,    'rgba(8,145,178,0)');
      sCtx.fillStyle = shimmer;
      sCtx.fillRect(0, 0, scratchCanvas.width, scratchCanvas.height);

      sCtx.save();
      sCtx.globalAlpha = 0.07;
      const density = Math.floor(scratchCanvas.width * scratchCanvas.height / 55);
      for (let i = 0; i < density; i++) {
        const x = Math.random() * scratchCanvas.width;
        const y = Math.random() * scratchCanvas.height;
        const r = Math.random() * 1.8 + 0.3;
        sCtx.beginPath();
        sCtx.arc(x, y, r, 0, Math.PI * 2);
        sCtx.fillStyle = '#ffffff';
        sCtx.fill();
      }
      sCtx.restore();
    }

    // ── Particles ─────────────────────────────────────────────────────────────

    function spawnParticles(x, y) {
      const count = Math.floor(Math.random() * 4) + 2;
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist  = BRUSH_R * (0.75 + Math.random() * 0.7);
        particles.push({
          x:    x + Math.cos(angle) * dist,
          y:    y + Math.sin(angle) * dist,
          vx:   (Math.random() - 0.5) * 1.2,
          vy:   Math.random() * 1.2 + 0.3,
          life: 0.9 + Math.random() * 0.3,
          size: Math.random() * 2.2 + 0.8,
        });
      }
      if (!animating) runParticles();
    }

    function runParticles() {
      animating = true;
      pCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x    += p.vx;
        p.y    += p.vy;
        p.vy   += 0.06; // gravity
        p.life -= 0.028;

        if (p.life <= 0) { particles.splice(i, 1); continue; }

        pCtx.save();
        pCtx.globalAlpha = Math.min(p.life, 0.85);
        pCtx.fillStyle   = '#334155';
        pCtx.beginPath();
        pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        pCtx.fill();
        pCtx.restore();
      }

      if (particles.length > 0) {
        requestAnimationFrame(runParticles);
      } else {
        animating = false;
      }
    }

    // ── Scratch ───────────────────────────────────────────────────────────────

    function scratch(x, y) {
      sCtx.save();
      sCtx.globalCompositeOperation = 'destination-out';

      const g = sCtx.createRadialGradient(x, y, 0, x, y, BRUSH_R);
      g.addColorStop(0,   'rgba(0,0,0,1)');
      g.addColorStop(0.55,'rgba(0,0,0,0.9)');
      g.addColorStop(1,   'rgba(0,0,0,0)');

      sCtx.beginPath();
      sCtx.arc(x, y, BRUSH_R, 0, Math.PI * 2);
      sCtx.fillStyle = g;
      sCtx.fill();
      sCtx.restore();

      spawnParticles(x, y);

      events++;
      if (events % CHECK_EVERY === 0) checkCompletion();
    }

    function checkCompletion() {
      if (completed) return;
      const data  = sCtx.getImageData(0, 0, scratchCanvas.width, scratchCanvas.height).data;
      let clear   = 0;
      const step  = 4;
      const total = data.length / (4 * step);
      for (let i = 3; i < data.length; i += 4 * step) {
        if (data[i] < 128) clear++;
      }
      if (clear / total >= COMPLETE_AT) complete();
    }

    function complete() {
      completed = true;
      hint.classList.add('hidden');
      playRisingTone();

      let opacity = 1;
      const tick = setInterval(() => {
        opacity -= 0.035;
        scratchCanvas.style.opacity = Math.max(opacity, 0);
        if (opacity <= 0) {
          clearInterval(tick);
          scratchCanvas.style.display = 'none';
        }
      }, 16);
    }

    // ── Pointer position ──────────────────────────────────────────────────────

    function pos(e) {
      const rect   = scratchCanvas.getBoundingClientRect();
      const scaleX = scratchCanvas.width  / rect.width;
      const scaleY = scratchCanvas.height / rect.height;
      const src    = e.touches ? e.touches[0] : e;
      return {
        x: (src.clientX - rect.left) * scaleX,
        y: (src.clientY - rect.top)  * scaleY,
      };
    }

    // ── Mouse events ──────────────────────────────────────────────────────────

    scratchCanvas.addEventListener('mousedown', e => {
      ensureAudio();
      drawing = true;
      hint.classList.add('hidden');
      startScratchLoop();
      const { x, y } = pos(e);
      scratch(x, y);
    });

    scratchCanvas.addEventListener('mousemove', e => {
      if (!drawing) return;
      const { x, y } = pos(e);
      scratch(x, y);
    });

    scratchCanvas.addEventListener('mouseup',    () => { drawing = false; stopScratchLoop(); });
    scratchCanvas.addEventListener('mouseleave', () => { drawing = false; stopScratchLoop(); });

    // ── Touch events ──────────────────────────────────────────────────────────

    scratchCanvas.addEventListener('touchstart', e => {
      e.preventDefault();
      ensureAudio();
      drawing = true;
      hint.classList.add('hidden');
      startScratchLoop();
      const { x, y } = pos(e);
      scratch(x, y);
    }, { passive: false });

    scratchCanvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (!drawing) return;
      const { x, y } = pos(e);
      scratch(x, y);
    }, { passive: false });

    scratchCanvas.addEventListener('touchend', () => { drawing = false; stopScratchLoop(); });

    // ── Responsive ────────────────────────────────────────────────────────────

    const ro = new ResizeObserver(() => { if (!completed) initCanvas(); });
    ro.observe(wrapper);

    initCanvas();
  </script>

</body>
</html>
